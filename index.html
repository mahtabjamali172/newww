<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHTAB PREMIUM HACK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Animated background particles */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 165, 0, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(20px) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(-20px) scale(0.5);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        /* Brand */
        .brand {
            font-size: 0.875rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 165, 0, 0.6);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Period Card */
        .period-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 165, 0, 0.15);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s;
        }

        .period-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 165, 0, 0.03) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .period-card:hover {
            border-color: rgba(255, 165, 0, 0.3);
            transform: translateY(-2px);
        }

        .label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 0.75rem;
            position: relative;
        }

        .period-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffa500;
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
            position: relative;
            text-shadow: 0 0 40px rgba(255, 165, 0, 0.3);
            word-break: break-all;
        }

        .period-number.game {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        /* Timer Card */
        .timer-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .timer-card:hover {
            border-color: rgba(0, 255, 136, 0.3);
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 200;
            color: #00ff88;
            letter-spacing: 6px;
            font-variant-numeric: tabular-nums;
            position: relative;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
            line-height: 1;
        }

        .timer-unit {
            font-size: 0.875rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 255, 136, 0.5);
            margin-top: 0.5rem;
            position: relative;
        }

        /* Progress Ring */
        .progress-ring-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 1.5rem;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(0, 255, 136, 0.08);
            stroke-width: 6;
        }

        .progress-ring-fill {
            fill: none;
            stroke: #00ff88;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear;
            filter: drop-shadow(0 0 6px rgba(0, 255, 136, 0.5));
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 300;
            color: #00ff88;
            font-variant-numeric: tabular-nums;
        }

        /* Prediction Section */
        .prediction-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .prediction-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 150, 255, 0.05), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .prediction-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 150, 255, 0.6);
            margin-bottom: 1rem;
            position: relative;
        }

        .prediction-result {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            position: relative;
            transition: all 0.3s ease;
        }

        .prediction-result.BIG {
            color: #ff4444;
            text-shadow: 0 0 40px rgba(255, 68, 68, 0.4);
        }

        .prediction-result.SMALL {
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
        }

        .prediction-number {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.5rem;
            position: relative;
        }

        .calculation-text {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 0.75rem;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        /* History Section */
        .history-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .history-title {
            font-size: 0.875rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            position: relative;
        }

        .history-table th {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
        }

        .history-table td {
            font-size: 0.85rem;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-variant-numeric: tabular-nums;
        }

        .history-table tr:last-child td {
            border-bottom: none;
        }

        .history-table tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .badge.BIG {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .badge.SMALL {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        /* Current Time */
        .current-time {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .timezone-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-top: 0.75rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Scrollbar for history */
        .history-scroll {
            max-height: 320px;
            overflow-y: auto;
            position: relative;
        }

        .history-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .history-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .history-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 165, 0, 0.3);
            border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .period-number {
                font-size: 1.5rem;
                letter-spacing: 1px;
            }
            .period-number.game {
                font-size: 1.2rem;
            }
            .period-card, .timer-card, .prediction-card, .history-card {
                padding: 1.5rem 1rem;
            }
            .timer-display {
                font-size: 3rem;
            }
            .progress-ring-container {
                width: 140px;
                height: 140px;
            }
            .progress-text {
                font-size: 1.8rem;
            }
            .prediction-result {
                font-size: 2.2rem;
            }
            .history-table th,
            .history-table td {
                font-size: 0.7rem;
                padding: 0.5rem 0.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="brand">ASHURA Timer</div>

        <!-- Game Period Number -->
        <div class="period-card">
            <div class="label">Game Period</div>
            <div class="period-number game" id="gamePeriodNumber">Loading...</div>
            <div class="timezone-badge" style="margin-top: 0.75rem;">
                <span style="font-size: 1rem;">&#127759;</span>
                UTC Sync (17 Digit)
            </div>
        </div>

        <!-- Web Period Number -->
        <div class="period-card">
            <div class="label">Web Period</div>
            <div class="period-number" id="webPeriodNumber">Loading...</div>
            <div class="timezone-badge" style="margin-top: 0.75rem;">
                <span style="font-size: 1rem;">&#128187;</span>
                UTC Sync (13 Digit)
            </div>
        </div>

        <!-- Timer with Ring -->
        <div class="timer-card">
            <div class="label">Next Period In</div>
            <div class="progress-ring-container">
                <svg class="progress-ring" width="180" height="180" viewBox="0 0 180 180">
                    <circle class="progress-ring-bg" cx="90" cy="90" r="78"/>
                    <circle class="progress-ring-fill" cx="90" cy="90" r="78"
                            stroke-dasharray="490.09"
                            stroke-dashoffset="0"
                            id="progressCircle"/>
                </svg>
                <div class="progress-text" id="ringTimer">30</div>
            </div>
            <div class="timer-unit">Seconds Remaining</div>
        </div>

        <!-- Prediction Section -->
        <div class="prediction-card">
            <div class="prediction-title">Current Period Prediction</div>
            <div class="prediction-result" id="predictionResult">--</div>
            <div class="prediction-number" id="predictionNumber">Result Number: --</div>
            <div class="calculation-text" id="calculationText">Waiting for next period...</div>
        </div>

        <!-- History Section -->
        <div class="history-card">
            <div class="history-title">
                <span>&#128220;</span> Period History & Results
            </div>
            <div class="history-scroll">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Period</th>
                            <th>Game Period</th>
                            <th>Result</th>
                            <th>Prediction</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- History rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Current Time -->
        <div class="current-time" id="currentTime">--</div>
        <div class="timezone-badge">
            <div class="live-dot"></div>
            LIVE
        </div>
    </div>

    <script>
        // Create background particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (8 + Math.random() * 12) + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.width = particle.style.height = (2 + Math.random() * 4) + 'px';
            particlesContainer.appendChild(particle);
        }

        // Progress ring setup
        const circle = document.getElementById('progressCircle');
        const radius = 78;
        const circumference = 2 * Math.PI * radius;
        circle.style.strokeDasharray = circumference;
        circle.style.strokeDashoffset = 0;

        // History management
        let history = JSON.parse(localStorage.getItem('periodHistory') || '[]');
        let lastGamePeriod = localStorage.getItem('lastGamePeriod') || '';
        let lastWebPeriod = localStorage.getItem('lastWebPeriod') || '';
        let lastPrediction = localStorage.getItem('lastPrediction') || '';

        function saveHistory() {
            if (history.length > 50) {
                history = history.slice(-50);
            }
            localStorage.setItem('periodHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            const reversed = [...history].reverse();
            
            for (const entry of reversed) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${entry.webPeriod.slice(-5)}</td>
                    <td style="font-size:0.75rem;opacity:0.6;">${entry.gamePeriod}</td>
                    <td><span class="badge ${entry.result}">${entry.result}</span></td>
                    <td><span class="badge ${entry.prediction}" style="opacity:0.7;">${entry.prediction}</span></td>
                `;
                tbody.appendChild(tr);
            }
        }

        // Prediction calculation
        function getPrediction(periodNumber) {
            let hash = 0;
            for (let i = 0; i < periodNumber.length; i++) {
                const digit = parseInt(periodNumber[i]);
                if (!isNaN(digit)) {
                    hash = ((hash << 5) - hash) + digit * 7;
                    hash = hash & hash;
                }
            }
            
            const absHash = Math.abs(hash);
            const resultDigit = absHash % 10;
            const result = resultDigit >= 5 ? 'BIG' : 'SMALL';
            const calcStr = `Hash(${periodNumber.slice(-4)}) % 10 = ${resultDigit} → ${result}`;
            
            return {
                result: result,
                digit: resultDigit,
                calc: calcStr
            };
        }

        function updatePrediction(gamePeriod, webPeriod) {
            const pred = getPrediction(gamePeriod);
            const resultEl = document.getElementById('predictionResult');
            const numberEl = document.getElementById('predictionNumber');
            const calcEl = document.getElementById('calculationText');
            
            resultEl.textContent = pred.result;
            resultEl.className = 'prediction-result ' + pred.result;
            numberEl.textContent = `Result Number: ${pred.digit}`;
            calcEl.textContent = pred.calc;
            
            return pred.result;
        }

        function addToHistory(gamePeriod, webPeriod, prediction) {
            const exists = history.some(h => h.gamePeriod === gamePeriod);
            if (exists) return;
            
            const result = getPrediction(gamePeriod).result;
            
            history.push({
                gamePeriod: gamePeriod,
                webPeriod: webPeriod,
                prediction: prediction,
                result: result,
                timestamp: new Date().toISOString()
            });
            
            saveHistory();
            renderHistory();
        }

        // Main update function
        function updateTimer() {
            const now = new Date();
            const istTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
            const utcTime = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));

            const utcSeconds = utcTime.getSeconds();
            const utcMinutes = utcTime.getMinutes();
            const utcHours = utcTime.getHours();

            let totalPeriods = utcHours * 120 + utcMinutes * 2 + (utcSeconds >= 30 ? 1 : 0);
            totalPeriods += 1;

            const istSeconds = istTime.getSeconds();
            const remainingSeconds = 30 - (istSeconds % 30);

            const year = utcTime.getFullYear();
            const month = String(utcTime.getMonth() + 1).padStart(2, '0');
            const day = String(utcTime.getDate()).padStart(2, '0');
            const datePrefix = `${year}${month}${day}`;
            
            const webPeriodStr = String(10000 + totalPeriods);
            const webPeriodNumber = `${datePrefix}${webPeriodStr}`;
            
            const periodLast4 = String(totalPeriods).padStart(4, '0');
            const gamePeriodNumber = `${datePrefix}10005${periodLast4}`;

            document.getElementById('gamePeriodNumber').textContent = gamePeriodNumber;
            document.getElementById('webPeriodNumber').textContent = webPeriodNumber;

            document.getElementById('ringTimer').textContent = remainingSeconds;

            const progress = remainingSeconds / 30;
            const offset = circumference * (1 - progress);
            circle.style.strokeDashoffset = offset;

            const timeStr = istTime.toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            document.getElementById('currentTime').textContent = timeStr + ' IST';

            if (remainingSeconds <= 5) {
                circle.style.stroke = '#ff4444';
                document.getElementById('ringTimer').style.color = '#ff4444';
            } else if (remainingSeconds <= 10) {
                circle.style.stroke = '#ffaa00';
                document.getElementById('ringTimer').style.color = '#ffaa00';
            } else {
                circle.style.stroke = '#00ff88';
                document.getElementById('ringTimer').style.color = '#00ff88';
            }

            const prediction = updatePrediction(gamePeriodNumber, webPeriodNumber);

            // When period changes, save previous to history
            if (lastGamePeriod !== '' && lastGamePeriod !== gamePeriodNumber) {
                addToHistory(lastGamePeriod, lastWebPeriod, lastPrediction);
            }
            
            // Update tracking for current period
            if (lastGamePeriod !== gamePeriodNumber) {
                lastGamePeriod = gamePeriodNumber;
                lastWebPeriod = webPeriodNumber;
                lastPrediction = prediction;
                localStorage.setItem('lastGamePeriod', lastGamePeriod);
                localStorage.setItem('lastWebPeriod', lastWebPeriod);
                localStorage.setItem('lastPrediction', lastPrediction);
            }
        }

        // Initial render
        renderHistory();

        // Update immediately and then every second
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
